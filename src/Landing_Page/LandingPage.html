<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">

    <link rel="stylesheet" href="../Navbar/Navbar.css">
    <link rel="stylesheet" href="./LandingPage.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="nav__logo">
            <a href="../Landing_Page/LandingPage.html">
                StayHealthy
                <svg xmlns="http://www.w3.org/2000/svg" height="26" width="26" viewBox="0 0 1000 1000" style="fill:#3685fb">
                    <title>Doctor Icon</title>
                    <g>
                        <path d="M499.8,10c91.7,0,166,74.3,166,166c0,91.7-74.3,166-166,166c-91.7,0-166-74.3-166-166C333.8,84.3,408.1,10,499.8,10z"></path>
                    </g>
                </svg>
            </a>
            <span>.</span>
        </div>

        <div class="nav__icon" onclick="handleClick()">
            <i class="fa fa-bars"></i>
        </div>

        <ul class="nav__links">
            <li class="link">
                <a href="../Landing_Page/LandingPage.html">Home</a>
            </li>

            <li class="link">
                <a href="#">Appointments</a>
            </li>

            <li class="link">
                <a href="../Sign_Up/Sign_Up.html">
                    <button class="btn1">Sign Up</button>
                </a>
            </li>

            <li class="link">
                <a href="../Login/Login.html">
                    <button class="btn1">Login</button>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
        <div>
            <div data-aos="fade-up" class="flex-hero">

                <h1>
                    Your Health <br>
                    <span class="text-gradient">
                        Our Responsibility
                    </span>
                </h1>

                <div class="blob-cont">
                    <div class="blue blob"></div>
                </div>

                <div class="blob-cont">
                    <div class="blue1 blob"></div>
                </div>

                <h4>
                    Lorem, ipsum dolor sit amet consectetur adipisicing elit.
                    Eaque at quae ducimus. Suscipit omnis quibusdam non cum rem
                    voluptatem!
                </h4>

                <a href="#services">
                    <button class="button">Get Started</button>
                </a>

            </div>
        </div>
    </section>

    <script>
        function handleClick() {
            const navLinks = document.querySelector(".nav__links");
            const navIcon = document.querySelector(".nav__icon i");

            navLinks.classList.toggle("active");

            if (navLinks.classList.contains("active")) {
                navIcon.classList.remove("fa-bars");
                navIcon.classList.add("fa-times");
            } else {
                navIcon.classList.remove("fa-times");
                navIcon.classList.add("fa-bars");
            }
        }
    </script>

</body>
</html>
